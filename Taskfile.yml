version: "3"

tasks:
  default:
    desc: List all available tasks
    cmd: task --list

  install:
    desc: Install dependencies, build, and link for global use
    cmds:
      - npm install
      - task: build
      - npm link

  build:
    desc: Compile TypeScript to dist/
    cmd: npm run build
    sources:
      - src/**/*.ts
      - tsconfig.json
    generates:
      - dist/**/*.js

  dev:
    desc: Run the program without building (uses tsx)
    cmd: npm run dev

  test:
    desc: Run all unit tests
    cmd: npm test

  test:watch:
    desc: Run tests in watch mode
    cmd: npm test -- --watch

  lint:
    desc: Lint source files
    cmd: npm run lint

  bundle:
    desc: Bundle to a single paper-rocket.mjs for distribution
    cmd: npm run bundle

  clean:
    desc: Remove compiled output and bundle
    cmd: rm -rf dist/ paper-rocket.mjs

  ci:
    desc: Full CI check — install, build, lint, and test
    cmds:
      - npm install
      - task: build
      - task: lint
      - task: test
