name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Bundle
        run: npm run bundle

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: paper-rocket.mjs
          generate_release_notes: true
          body: |
            ## Installation

            Download `paper-rocket.mjs` and run it with Node.js (v18 or later):

            ```bash
            node paper-rocket.mjs
            ```

            No install step required.
